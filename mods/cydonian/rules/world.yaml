	ColorPickerManager:
		PreviewActor: example.colorpicker
	CreateMapPlayers:
	CustomTerrainDebugOverlay:
	DebugVisualizations:
	MapStartingLocations:
	PathFinder:
	SpawnMapActors:
	SpawnStartingUnits:
