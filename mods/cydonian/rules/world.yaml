^baseworld:
	Inherits: ^palettes
	ActorMap:
	AlwaysVisible:
	ControlGroups:
	Faction@Random:
		InternalName: Random
		Name: faction-random.name
		RandomFactionMembers: example
		Description: faction-random.description
	Faction@example:
		InternalName: example
		Name: faction-example.name
		Description: faction-example.description
	LoadWidgetAtGameStart:
	MusicPlaylist:
	ScreenMap:
	Selection:
	TerrainRenderer:
	Locomotor@FOOT:
		Name: foot
		SharesCell: true
		TerrainSpeeds:
			Clear: 100
			Resonance_Tier1: 80
			Resonance_Tier2: 55
			Resonance_Tier3: 35

world:
