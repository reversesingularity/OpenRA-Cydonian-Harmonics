		BaseActor: example
		Factions: example
		ClassName: options-starting-units.unlabeled

editorworld:
	Inherits: ^baseworld
	BuildableTerrainOverlay:
		AllowedTerrainTypes:
		Palette:
	EditorActionManager:
	EditorActorLayer:
	EditorCursorLayer:
	MarkerLayerOverlay:
	TerrainGeometryOverlay:
