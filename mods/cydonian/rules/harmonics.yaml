# Abstract Oathbound receiver bundle — harmony buffs + dermal-mark Layer One receivers.
# Faraday (faraday-shield) jams Layer One LoS leak without cleansing the mark.
^GuardianUnit:
	Inherits: example
	Health:
		HP: 10000
	Targetable:
		TargetTypes: GroundActor, Infantry
	ExternalCondition@HARMONY:
		Condition: harmony-sustained
	ChangesHealth@HARMONY:
		RequiresCondition: harmony-sustained
		Step: 200
		Delay: 5
		StartIfBelow: 100
	DamageMultiplier@HARMONY:
		RequiresCondition: harmony-sustained
		Modifier: 50
	ExternalCondition@DERMALMARK:
		Condition: dermal-mark
	ExternalCondition@FARADAY:
		Condition: faraday-shield
	RevealsShroud@DERMALMARK:
		RequiresCondition: dermal-mark && !faraday-shield
		Range: 2c0
		ValidRelationships: Enemy
	WithColoredOverlay@DERMALMARK:
		RequiresCondition: dermal-mark
		Color: CC884066

# Abstract Nephilim receiver bundle — Mo Chrá anti-ward (ward-unraveled) shreds armor.
^NephilimUnit:
	Inherits: example
	ExternalCondition@WARDUNRAVELED:
		Condition: ward-unraveled
	DamageMultiplier@WARDUNRAVELED:
		RequiresCondition: ward-unraveled
		Modifier: 150
	WithColoredOverlay@WARDUNRAVELED:
		RequiresCondition: ward-unraveled
		Color: 20808066

