# Abstract Oathbound receiver bundle — ExternalCondition + regen + ward while harmony-sustained.
^GuardianUnit:
	Inherits: example
	Health:
		HP: 10000
	ExternalCondition@HARMONY:
		Condition: harmony-sustained
	ChangesHealth@HARMONY:
		RequiresCondition: harmony-sustained
		Step: 200
		Delay: 5
		StartIfBelow: 100
	DamageMultiplier@HARMONY:
		RequiresCondition: harmony-sustained
		Modifier: 50

# Stub infantry until the full Oathbound roster lands.
